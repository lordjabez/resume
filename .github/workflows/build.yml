name: Build

on:
  push:
    branches:
      - '**'

jobs:
  convert:
    name: Build PDF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_dir: resume.md
          output_dir: dist
          build_html: false
      - uses: actions/upload-artifact@v7
        with:
          name: resume
          path: dist
